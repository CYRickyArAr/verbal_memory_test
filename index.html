<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verbal Memory Test</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, "Microsoft YaHei", sans-serif;
      background: #ffffff;
      color: #222222;
      overflow: hidden;
    }

    button {
      border: 0;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      transition: transform 0.08s ease, opacity 0.15s ease, background 0.15s ease;
    }

    button:hover {
      background: #f0f0f0;
    }

    button:active {
      transform: translateY(1px);
    }

    .screen {
      display: none;
      width: 100vw;
      height: 100vh;
      background: #ffffff;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .screen.active {
      display: flex;
    }

    .content {
      width: min(1100px, 100%);
      margin: 0 auto;
    }

    .icon {
      width: 86px;
      height: 86px;
      margin: 0 auto 52px;
      opacity: 0.28;
    }

    .icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .home-title {
      font-size: clamp(48px, 6.5vw, 96px);
      font-weight: 400;
      line-height: 1.05;
      margin: 0 0 42px;
      letter-spacing: -0.045em;
      color: #222222;
    }

    .desc {
      font-size: clamp(17px, 1.35vw, 24px);
      line-height: 1.55;
      margin: 0 auto 38px;
      font-weight: 400;
      color: #555555;
      max-width: 980px;
    }

    .yellow-btn,
    .blue-btn {
      background: #eeeeee;
      color: #222222;
      min-width: 140px;
      height: 62px;
      padding: 0 34px;
      border-radius: 6px;
      font-size: 24px;
      border: 1px solid #dddddd;
      box-shadow: none;
    }

    .yellow-btn:hover,
    .blue-btn:hover {
      background: #e5e5e5;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 26px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 26px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #4CAF50;
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    input:disabled + .slider {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .game-box {
      width: min(760px, 100%);
      margin: 0 auto;
      transform: translateY(-10px);
    }

    .top-stats {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 34px;
      color: #777777;
      font-size: clamp(24px, 2vw, 34px);
      margin-bottom: 54px;
      font-weight: 400;
    }

    .top-stats strong {
      color: #222222;
      font-weight: 700;
    }

    .word {
      font-size: clamp(54px, 5.5vw, 82px);
      line-height: 1.1;
      min-height: 100px;
      font-weight: 400;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 40px;
      color: #222222;
    }

    .choice-row {
      display: flex;
      justify-content: center;
      gap: 34px;
    }

    .result-icon {
      width: 94px;
      height: 94px;
      margin: 0 auto 42px;
      opacity: 0.9;
    }

    .result-kicker {
      font-size: 30px;
      margin-bottom: 18px;
      font-weight: 400;
      color: #333333;
    }

    .result-score {
      font-size: clamp(68px, 7vw, 110px);
      line-height: 1;
      margin: 0 0 36px;
      font-weight: 400;
      letter-spacing: -0.05em;
      color: #222222;
    }

    .result-time {
      font-size: clamp(30px, 3vw, 48px);
      line-height: 1.15;
      margin: -10px 0 38px;
      font-weight: 400;
      color: #333333;
    }

    .result-subtitle {
      font-size: clamp(17px, 1.35vw, 24px);
      margin: 0 0 34px;
      font-weight: 400;
      color: #555555;
    }

    .result-actions {
      display: flex;
      justify-content: center;
    }

    .footer-tools {
      position: fixed;
      right: 18px;
      bottom: 18px;
      display: flex;
      gap: 8px;
      opacity: 0.35;
      transition: opacity 0.2s ease;
    }

    .music-bar {
      position: fixed;
      left: 18px;
      top: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      z-index: 100;
    }

    .high-score {
      position: fixed;
      right: 18px;
      top: 18px;
      font-size: 16px;
      color: #4CAF50;
      z-index: 100;
    }

    .footer-tools:hover {
      opacity: 1;
    }

    .small-btn {
      height: 34px;
      border-radius: 6px;
      padding: 0 11px;
      background: #f5f5f5;
      color: #333333;
      border: 1px solid #dddddd;
      font-size: 13px;
      font-weight: 600;
    }

    .history-panel {
      position: fixed;
      right: 18px;
      bottom: 62px;
      width: 360px;
      max-height: 420px;
      overflow: auto;
      display: none;
      background: #ffffff;
      border: 1px solid #dddddd;
      border-radius: 10px;
      padding: 14px;
      text-align: left;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
    }

    .history-panel.show {
      display: block;
    }

    .words-panel {
      position: fixed;
      right: 18px;
      bottom: 62px;
      width: 320px;
      max-height: 420px;
      background: #ffffff;
      border-radius: 14px;
      padding: 14px;
      text-align: left;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
      display: none;
      overflow: hidden;
      flex-direction: column;
    }

    .words-panel.show {
      display: flex;
    }

    .words-title {
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 15px;
      color: #222222;
      flex-shrink: 0;
    }

    .words-list {
      overflow-y: auto;
      flex: 1;
      font-size: 13px;
      color: #333333;
      line-height: 1.6;
    }

    .word-item {
      padding: 2px 0;
      border-bottom: 1px solid #eeeeee;
    }

    .history-title {
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 15px;
      color: #222222;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      color: #333333;
    }

    th,
    td {
      padding: 7px 5px;
      border-bottom: 1px solid #eeeeee;
      text-align: left;
    }

    th {
      color: #777777;
      font-weight: 600;
    }

    @media (max-width: 700px) {
      .icon {
        margin-bottom: 38px;
      }

      .home-title {
        margin-bottom: 32px;
      }

      .choice-row {
        gap: 16px;
      }

      .yellow-btn,
      .blue-btn {
        min-width: 124px;
        height: 56px;
        font-size: 21px;
        padding: 0 22px;
      }

      .top-stats {
        gap: 20px;
        margin-bottom: 40px;
      }

      .history-panel {
        left: 16px;
        right: 16px;
        width: auto;
      }

      .words-panel {
        left: 16px;
        right: 16px;
        width: auto;
      }
    }
  </style>
</head>

      <button id="startBtn" class="yellow-btn">Start</button>
    </div>
  </section>

  <section id="gameScreen" class="screen">

    </div>
  </section>

  <section id="resultScreen" class="screen">
    <div class="content">

      <div class="result-kicker">Verbal Memory</div>
      <h2 id="finalScore" class="result-score">0 words</h2>
      <div id="finalTime" class="result-time">Total time 00:00.0</div>
      <div class="result-actions">
        <button id="tryAgainBtn" class="yellow-btn">Try again</button>
      </div>
    </div>
  </section>

  <div id="historyPanel" class="history-panel">
    <div class="history-title">历史记录</div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Score</th>
          <th>Time</th>
          <th>Date</th>
          <th>Music</th>
        </tr>
      </thead>
      <tbody id="historyBody"></tbody>
    </table>
  </div>

  <div id="wordsPanel" class="words-panel">
    <div class="words-title">词汇表</div>
    <div id="wordCountText" style="font-size:12px;color:#777;margin-bottom:8px;">Word bank: -</div>
    <div id="wordsList" class="words-list"></div>
  </div>

  <div class="music-bar">
    <span>🎵 音乐</span>
    <label class="switch">
      <input type="checkbox" id="musicToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div id="highScoreDisplay" class="high-score"></div>

  <div class="footer-tools">
    <button id="historyBtn" class="small-btn">History</button>
    <button id="viewWordsBtn" class="small-btn">View Words</button>
    <button id="exportBtn" class="small-btn">Export CSV</button>

    let lives = 1;
    let score = 0;
    let startTime = 0;
    let totalTimeMs = 0;
    let currentWord = '';
    let seenWords = new Set();
    let shownWords = [];
    let consecutiveNewWords = 0;
    let isFirstAnswer = false;
    let history = JSON.parse(localStorage.getItem(storageKey) || '[]');
    let customWordList = JSON.parse(localStorage.getItem(customWordsKey) || '[]');

    function getActiveWordList() {
      return customWordList.length > 0 ? customWordList : builtInWordList;
    }

    function updateWordCount() {
      const source = customWordList.length > 0 ? 'custom' : 'built-in';
      wordCountText.textContent = `Word bank: ${getActiveWordList().length.toLocaleString()} words (${source})`;
    }

    function showScreen(name) {
      homeScreen.classList.remove('active');
      gameScreen.classList.remove('active');
      resultScreen.classList.remove('active');

      if (name === 'home') homeScreen.classList.add('active');
      if (name === 'game') gameScreen.classList.add('active');
      if (name === 'result') resultScreen.classList.add('active');
    }

    function formatMs(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      const tenths = Math.floor(ms / 100) % 10;
      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${tenths}`;
    }

    function randomFrom(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function chooseNextWord() {
      const forceRepeat = consecutiveNewWords >= 5;
      const shouldRepeat = forceRepeat || (shownWords.length > 2 && Math.random() < 0.35);

      if (shouldRepeat) {
        const seenPool = [...seenWords].filter(word => word !== currentWord);
        if (seenPool.length > 0) {
          consecutiveNewWords = 0;
          return randomFrom(seenPool);
        }
      }

      const activeWords = getActiveWordList();
      const freshPool = activeWords.filter(word => !seenWords.has(word) && word !== currentWord);
      if (freshPool.length > 0) {
        consecutiveNewWords++;
        return randomFrom(freshPool);
      }

      const availablePool = activeWords.filter(word => word !== currentWord);
      consecutiveNewWords = 0;
      return availablePool.length > 0 ? randomFrom(availablePool) : randomFrom(activeWords);
    }

    function updateStats() {
      livesText.textContent = lives;
      scoreText.textContent = score;
    }

    function nextRound() {
      currentWord = chooseNextWord();
      wordText.textContent = currentWord;
      updateStats();
    }

    function startGame() {
      musicToggle.disabled = true;
      
      lives = 1;
      score = 0;
      totalTimeMs = 0;
      currentWord = '';
      seenWords = new Set();
      shownWords = [];
      consecutiveNewWords = 0;
      isFirstAnswer = true;
      updateStats();
      showScreen('game');
      nextRound();
    }

    function answer(isSeenAnswer) {
      if (isFirstAnswer) {
        startTime = performance.now();
        isFirstAnswer = false;
      }
      
      const wordHasBeenSeen = seenWords.has(currentWord);
      const correct = isSeenAnswer === wordHasBeenSeen;

      if (correct) {
        score += 1;
      } else {
        lives -= 1;
      }

      if (!wordHasBeenSeen) {
        seenWords.add(currentWord);
      }
      shownWords.push(currentWord);

      if (lives <= 0) {
        endGame();
        return;
      }

      nextRound();
    }

    function endGame() {
      musicToggle.disabled = false;
      
      totalTimeMs = Math.round(performance.now() - startTime);
      finalScore.textContent = `${score} ${score === 1 ? 'word' : 'words'}`;
      finalTime.textContent = `Total time ${formatMs(totalTimeMs)}`;
      
      const record = {
        score,
        timeMs: totalTimeMs,
        date: new Date().toLocaleString('zh-CN', { hour12: false }),
        music: musicToggle.checked ? '开' : '关'
      };
      history.unshift(record);
      localStorage.setItem(storageKey, JSON.stringify(history));
      renderHistory();
      
      showScreen('result');
    }

    function renderHistory() {
      historyBody.innerHTML = history.map((item, index) => `
        <tr>
          <td>${history.length - index}</td>
          <td>${item.score}</td>
          <td>${formatMs(item.timeMs)}</td>
          <td>${item.date}</td>
          <td>${item.music || '关'}</td>
        </tr>
      `).join('');
      
      const highScore = history.reduce((max, item) => Math.max(max, item.score), 0);
      highScoreDisplay.textContent = highScore > 0 ? `🏆 最高分: ${highScore}` : '';
    }

    function exportCsv() {
      const formatTime = (ms) => {
        const msNum = typeof ms === 'string' ? parseInt(ms) : ms;
        const totalSeconds = Math.floor(msNum / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        const tenths = Math.floor(msNum / 100) % 10;
        return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${tenths}`;
      };
      const header = ['No.', 'Score', 'Total Time', 'Date', 'Music'];
      const rows = history.slice().reverse().map((item, index) => [
        index + 1,
        item.score,
        formatTime(item.timeMs),
        item.date,
        item.music || '关'
      ]);
      const csv = [header, ...rows]
        .map(row => row.map(value => `"${String(value).replaceAll('"', '""')}"`).join(','))
        .join('\n');
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `verbal-memory-results-${new Date().toISOString().slice(0, 10)}.csv`;
      link.click();
      URL.revokeObjectURL(url);
    }

    startBtn.addEventListener('click', startGame);
    seenBtn.addEventListener('click', () => answer(true));
    newBtn.addEventListener('click', () => answer(false));
    tryAgainBtn.addEventListener('click', () => showScreen('home'));

    historyBtn.addEventListener('click', () => {
      historyPanel.classList.toggle('show');
      updateWordCount();
    });

    function renderWordsPanel() {
      const activeList = getActiveWordList();
      const isCustom = customWordList.length > 0;
      wordsList.innerHTML = activeList.map(word =>
        `<div class="word-item">${word}</div>`
      ).join('');
      document.querySelector('.words-title').textContent = isCustom ? '自定义词汇表' : '内置词汇表';
    }

    viewWordsBtn.addEventListener('click', () => {
      wordsPanel.classList.toggle('show');
      if (wordsPanel.classList.contains('show')) {
        renderWordsPanel();
      }
    });

    exportBtn.addEventListener('click', exportCsv);

    clearBtn.addEventListener('click', () => {
      if (!confirm('确定清空历史记录吗？')) return;
      history = [];
      localStorage.setItem(storageKey, JSON.stringify(history));
      renderHistory();
    });

    document.addEventListener('keydown', event => {
      if (!gameScreen.classList.contains('active')) return;
      const key = event.key.toLowerCase();
      if (key === 's') answer(true);
      if (key === 'n') answer(false);
      if (key === 'arrowleft') answer(true);
      if (key === 'arrowright') answer(false);
    });

    renderHistory();
    updateWordCount();

    async function loadWordListFromServer() {
      if (customWordList.length > 0) {
        return;
      }
      try {
        const response = await fetch('考研-乱序_仅单词.txt');
        if (!response.ok) throw new Error('文件不存在');
        
        const text = await response.text();
        const words = text
          .split('\n')
          .map(word => word.trim().toLowerCase())
          .filter(word => word.length > 0 && /^[a-z][a-z\- ]{1,40}$/.test(word));

        const uniqueWords = [...new Set(words)];
        
        if (uniqueWords.length >= 10) {
          customWordList = uniqueWords;
          localStorage.setItem(customWordsKey, JSON.stringify(customWordList));
          updateWordCount();
          console.log(`自动加载词汇表成功，共 ${uniqueWords.length} 个词`);
        }
      } catch (error) {
        console.log('自动加载词汇表失败，使用内置词库:', error.message);
      }
    }
